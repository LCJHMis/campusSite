<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘭州國中段考時程顯示</title>
    <style>
        /* ================= 全域與蘭州國中官網配色設定 ================= */
        :root {
            /* 蘭州國中官網風格 (白底、蘭州藍、橘黃點綴) */
            --bg-color: #ffffff;       /* 純白 (背景) */
            --panel-bg: #ffffff;       /* 區塊背景純白 */
            --text-main: #333333;      /* 深灰 (主文字，提升易讀性) */
            --text-muted: #666666;     /* 中灰 (次要文字) */
            --accent-color: #2b70a5;   /* 蘭州藍 (官網導覽列主色) */
            --accent-hover: #1e527c;   /* 深蘭州藍 (按鈕懸停) */
            --highlight-bg: #fff8eb;   /* 淺暖黃 (正在進行的考試高亮底色) */
            --highlight-text: #333333; /* 高亮時的文字顏色 */
            --highlight-border: #f2a62c; /* 活力橘黃 (官網箭頭色，用於強調) */
            --btn-bg: #f4f7fa;         /* 淺灰藍 (一般按鈕底色) */
            --btn-hover: #e2eaf2;      /* 淺灰藍加深 (一般按鈕懸停) */
            --modal-bg: #ffffff;       /* 彈出視窗背景 */
            --border-color: #dce3e9;   /* 邊框顏色 (淺灰藍) */
            --element-bg: #f8fbff;     /* 內部元素背景 (如時程列、輸入框，帶極淡的藍) */
            --table-th-bg: #eaf1f8;    /* 表格標題背景 */
        }

        /* 限定標楷體系列 */
        * { 
            box-sizing: border-box; 
            font-family: 'BiauKai', 'DFKai-SB', '楷體', STKaiti, serif; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 強制不出現捲軸，單頁呈現 */
        }

        /* ================= 頂部控制列 ================= */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 8vh;
            padding: 0 2vw;
            background-color: var(--accent-color); /* 使用蘭州藍 */
            border-bottom: 3px solid var(--accent-hover);
            gap: 1.5vw;
        }

        .exam-title {
            font-size: clamp(1.2rem, 2vw, 3rem);
            color: #ffffff; /* 藍底配白字 */
            margin-right: auto;
            margin-left: auto;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .top-controls {
            display: flex;
            align-items: center;
            gap: 1vw;
        }

        /* 頂部按鈕特殊樣式 (線條按鈕) */
        .top-controls button {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 0.8vh 1.5vw;
            font-size: clamp(1rem, 1.5vw, 2rem);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .top-controls button:hover { 
            background-color: rgba(255, 255, 255, 0.2); 
            border-color: #ffffff;
        }

        /* 一般按鈕預設樣式 */
        button {
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 0.8vh 1.5vw;
            font-size: clamp(1rem, 1.5vw, 2rem);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        button:hover { background-color: var(--btn-hover); }
        button.active { background-color: var(--accent-color); border-color: var(--accent-color); color: #fff; }

        /* ================= 主內容區 ================= */
        .main-content {
            display: flex;
            flex: 1;
            padding: 2vh 2vw;
            gap: 2vw;
            height: 92vh; /* 扣除 top-bar 的 8vh */
        }

        /* --- 左半部：時程表 --- */
        .left-panel {
            flex: 5.5;
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2vh 2vw;
            box-shadow: 0 4px 15px rgba(43, 112, 165, 0.05); /* 帶有極淡藍色的陰影 */
            height: 100%; /* 填滿剩餘高度 */
        }

        .day-switch {
            display: flex;
            gap: 1vw;
            height: 7vh;
            margin-bottom: 1.5vh;
        }

        .day-switch button { 
            flex: 1; 
            font-size: clamp(1.5rem, 2vw, 3rem); 
            padding: 0; 
            font-weight: bold;
            color: var(--text-muted);
        }
        .day-switch button.active {
            color: #ffffff;
        }

        /* 時程列表容器：使用 flex-grow 填滿空間 */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 1vh;
            flex: 1;
            min-height: 0; /* 防止內部元素撐開父容器造成跑版 */
        }

        /* 每一列：均分剩餘空間，高度自適應 */
        .schedule-row {
            flex: 1; 
            display: flex;
            align-items: center;
            padding: 0 2vw;
            border-radius: 6px;
            background-color: var(--element-bg);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--border-color); /* 預設左側粗邊框 */
            transition: all 0.3s;
            /* 根據可用高度與寬度動態調整字體，避免文字太大造成跑版 */
            font-size: clamp(1.5rem, min(3.5vh, 2.5vw), 4rem); 
        }

        .schedule-row .period { width: 15%; color: var(--text-muted); font-size: 0.9em; }
        .schedule-row .time { width: 40%; text-align: center; font-family: monospace, 'BiauKai'; letter-spacing: 1px;}
        .schedule-row .subject { width: 45%; text-align: right; font-weight: bold; color: var(--text-main); }

        /* 醒目提醒 (Highlight) - 官網橘黃色高亮 */
        .schedule-row.highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
            border-color: var(--highlight-border);
            border-left: 8px solid var(--highlight-border); /* 強調左側邊框 */
            box-shadow: 0 4px 12px rgba(242, 166, 44, 0.15);
            transform: scale(1.01); /* 微微放大凸顯 */
        }
        .schedule-row.highlight .period { color: #c47600; font-weight: bold; }
        .schedule-row.highlight .time { font-weight: bold; color: #b06500; }
        .schedule-row.highlight .subject { color: var(--accent-color); }

        /* --- 右半部：時鐘與人數 --- */
        .right-panel {
            flex: 4.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2vh 2vw;
            box-shadow: 0 4px 15px rgba(43, 112, 165, 0.05);
            height: 100%;
        }

        .clock-container {
            text-align: center;
            margin-bottom: 8vh;
            width: 100%;
        }

        .clock-ampm { font-size: clamp(2rem, 4vw, 5rem); color: var(--text-muted); margin-bottom: 0; }
        .clock-time { 
            font-size: clamp(6rem, 12vw, 15rem); 
            font-weight: bold; 
            line-height: 1; 
            margin: 1vh 0; 
            color: var(--accent-color); /* 時間用蘭州藍 */
        }
        .clock-sec { font-size: clamp(3rem, 5vw, 6rem); color: var(--text-muted); margin-left: 1vw; }

        .attendance-container {
            display: flex;
            gap: 4vw;
            justify-content: center;
            width: 90%;
            background-color: var(--element-bg);
            padding: 4vh 0;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .attendance-box {
            text-align: center;
            flex: 1;
        }

        .attendance-label { 
            font-size: clamp(1.5rem, 2.5vw, 4rem); 
            color: var(--text-muted); 
            margin-bottom: 1.5vh; 
            letter-spacing: 2px;
        }
        .attendance-value { 
            font-size: clamp(3rem, 6vw, 8rem); 
            font-weight: bold; 
            color: var(--accent-color); 
        }

        /* ================= 彈出視窗區 (Modals) ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 30, 50, 0.5); /* 帶有微藍色的遮罩 */
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-box {
            background: var(--modal-bg);
            padding: 3vh 3vw;
            border-radius: 6px;
            border: 2px solid var(--accent-color);
            border-top: 6px solid var(--accent-color); /* 頂部加粗強調 */
            width: 60vw;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        .modal-title { 
            font-size: clamp(1.8rem, 2.5vw, 3rem); 
            margin-top: 0; 
            margin-bottom: 2vh; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 1vh; 
            color: var(--accent-color);
        }
        
        .modal-content {
            font-size: clamp(1.2rem, 1.8vw, 2.5rem);
            margin-bottom: 3vh;
        }

        .scrollable-content {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 1vw;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        .modal-actions { display: flex; justify-content: flex-end; gap: 1vw; }
        .modal-actions button { font-size: clamp(1.2rem, 1.8vw, 2.5rem); padding: 1vh 2vw; }
        .btn-primary { background-color: var(--accent-color); border-color: var(--accent-color); color: #fff;}
        .btn-primary:hover { background-color: var(--accent-hover); color: #fff; border-color: var(--accent-hover); }

        input[type="number"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 1.5vh 1vw;
            font-size: clamp(1.2rem, 2vw, 2.5rem);
            background: var(--element-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            margin-bottom: 2vh;
        }
        input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 5px rgba(43, 112, 165, 0.3); }

        .edit-table { width: 100%; border-collapse: collapse; margin-bottom: 2vh; }
        /* 【修復】加入 white-space: nowrap 防止「第一節」換行 */
        .edit-table th, .edit-table td { padding: 1vh; border: 1px solid var(--border-color); text-align: center; white-space: nowrap; }
        .edit-table th { background-color: var(--table-th-bg); color: var(--accent-color); }
        .edit-table input[type="text"] { font-size: clamp(1rem, 1.5vw, 2rem); padding: 0.5vh; margin-bottom: 0; text-align: center; }
        
        .edit-day-title { font-size: clamp(1.5rem, 2vw, 2.5rem); font-weight: bold; margin: 2vh 0 1vh; color: var(--accent-color); }

        .input-group { margin-bottom: 2vh; }
        .input-group label { display: block; font-size: clamp(1.2rem, 2vw, 2.5rem); margin-bottom: 1vh; color: var(--text-main); }

        /* 雙欄表單配置 */
        .form-row {
            display: flex;
            gap: 2vw;
            margin-bottom: 1vh;
        }
        .form-col {
            flex: 1;
        }
        .form-col .input-group {
            margin-bottom: 0;
        }

    </style>
</head>
<body>

    <!-- 頂部控制列 -->
    <div class="top-bar">
        <!-- 標題加入 id，方便動態修改 -->
        <span class="exam-title" id="main-exam-title">蘭州國中115學年度第一次段考</span>
        <div class="top-controls">
            <button id="btn-set-attendance">設定人數</button>
            <button id="btn-edit-subjects">編輯科目</button>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="main-content">
        <!-- 左側：時程表 -->
        <div class="left-panel">
            <div class="day-switch">
                <button id="btn-day1" class="active" onclick="switchDay(1)">第一天</button>
                <button id="btn-day2" onclick="switchDay(2)">第二天</button>
            </div>
            <div class="schedule-list" id="schedule-display">
                <!-- JavaScript 動態產生 -->
            </div>
        </div>

        <!-- 右側：時鐘與人數 -->
        <div class="right-panel">
            <div class="clock-container">
                <div class="clock-ampm" id="clock-ampm">上午</div>
                <div class="clock-time">
                    <span id="clock-hm">00:00</span><span class="clock-sec" id="clock-s">00</span>
                </div>
            </div>
            
            <div class="attendance-container">
                <div class="attendance-box">
                    <div class="attendance-label">實到人數</div>
                    <div class="attendance-value" id="disp-actual">0</div>
                </div>
                <div class="attendance-box">
                    <div class="attendance-label">應到人數</div>
                    <div class="attendance-value" id="disp-total">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 彈出視窗區 (Modals) ================= -->
    <div class="modal-overlay" id="msg-modal">
        <div class="modal-box" style="width: 40vw;">
            <h2 class="modal-title" id="msg-title">提示</h2>
            <div class="modal-content" id="msg-content"></div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="closeModal('msg-modal')">確定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pwd-modal">
        <div class="modal-box" style="width: 40vw;">
            <h2 class="modal-title">權限驗證</h2>
            <div class="modal-content">
                <label style="display:block; margin-bottom:1vh;">請輸入編輯密碼：</label>
                <input type="password" id="pwd-input" placeholder="輸入密碼">
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('pwd-modal')">取消</button>
                <button class="btn-primary" onclick="verifyPassword()">確認</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="attendance-modal">
        <div class="modal-box" style="width: 40vw;">
            <h2 class="modal-title">設定人數</h2>
            <div class="modal-content">
                <div class="input-group">
                    <label>實到人數 (不可為負)：</label>
                    <input type="number" id="input-actual" min="0">
                </div>
                <div class="input-group">
                    <label>應到人數 (不可為負)：</label>
                    <input type="number" id="input-total" min="0">
                </div>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('attendance-modal')">取消</button>
                <button class="btn-primary" onclick="saveAttendance()">儲存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-box" style="width: 60vw;">
            <h2 class="modal-title">編輯基本資訊與科目</h2>
            <div class="modal-content scrollable-content" id="edit-content">
                <!-- 表單與表格由 JS 動態產生 -->
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('edit-modal')">取消</button>
                <button class="btn-primary" onclick="saveSubjects()">儲存設定</button>
            </div>
        </div>
    </div>

    <!-- ================= JavaScript 邏輯 ================= -->
    <script>
        const defaultSchedule = {
            day1: [
                { period: "第一節", start: "08:30", end: "09:15", subject: "自習" },
                { period: "第二節", start: "09:25", end: "10:10", subject: "數學04" },
                { period: "第三節", start: "10:20", end: "11:05", subject: "自習" },
                { period: "第四節", start: "11:15", end: "12:00", subject: "英語02" },
                { period: "第五節", start: "13:15", end: "14:05", subject: "作文" },
                { period: "第六節", start: "14:20", end: "15:05", subject: "自習" },
                { period: "第七節", start: "15:15", end: "16:00", subject: "理化12" }
            ],
            day2: [
                { period: "第一節", start: "08:30", end: "09:00", subject: "自習" },
                { period: "第二節", start: "09:00", end: "10:10", subject: "公民06;歷史08;地理09" },
                { period: "第三節", start: "10:20", end: "11:05", subject: "自習" },
                { period: "第四節", start: "11:15", end: "12:00", subject: "國文01" }
            ]
        };

        let currentDay = 1;
        let scheduleData = JSON.parse(localStorage.getItem('lcjh_schedule')) || defaultSchedule;
        let attendanceData = JSON.parse(localStorage.getItem('lcjh_attendance')) || { actual: 0, total: 0 };
        // 新增標題資訊，預設為 112學年度，第一次
        let examInfo = JSON.parse(localStorage.getItem('lcjh_exam_info')) || { year: "115", exam: "一" };

        window.onload = () => {
            updateAttendanceDisplay();
            updateExamTitleDisplay();
            switchDay(1);
            setInterval(updateClockAndHighlight, 1000);
            updateClockAndHighlight();
        };

        // 更新頂部大標題
        function updateExamTitleDisplay() {
            document.getElementById('main-exam-title').innerText = `蘭州國中${examInfo.year}學年度第${examInfo.exam}次段考`;
        }

        function switchDay(day) {
            currentDay = day;
            document.getElementById('btn-day1').classList.toggle('active', day === 1);
            document.getElementById('btn-day2').classList.toggle('active', day === 2);
            renderSchedule();
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-display');
            container.innerHTML = '';
            const data = currentDay === 1 ? scheduleData.day1 : scheduleData.day2;
            
            data.forEach((item) => {
                const row = document.createElement('div');
                row.className = 'schedule-row';
                row.dataset.start = item.start;
                row.dataset.end = item.end;
                
                row.innerHTML = `
                    <div class="period">${item.period}</div>
                    <div class="time">${item.start} ~ ${item.end}</div>
                    <div class="subject">${item.subject}</div>
                `;
                container.appendChild(row);
            });
            updateClockAndHighlight();
        }

        function updateClockAndHighlight() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            const ampm = h >= 12 ? '下午' : '上午';
            let h12 = h % 12;
            h12 = h12 ? h12 : 12;

            document.getElementById('clock-ampm').innerText = ampm;
            document.getElementById('clock-hm').innerText = `${pad(h12)}:${pad(m)}`;
            document.getElementById('clock-s').innerText = pad(s);

            const currentMinutes = h * 60 + m;

            const rows = document.querySelectorAll('.schedule-row');
            rows.forEach(row => {
                const startStr = row.dataset.start;
                const endStr = row.dataset.end;
                
                const startMins = timeToMinutes(startStr);
                const endMins = timeToMinutes(endStr);

                if (currentMinutes >= startMins && currentMinutes < endMins) {
                    row.classList.add('highlight');
                } else {
                    row.classList.remove('highlight');
                }
            });
        }

        function pad(num) { return num < 10 ? '0' + num : num; }
        
        function timeToMinutes(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function showMessage(title, text) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-content').innerText = text;
            showModal('msg-modal');
        }

        document.getElementById('btn-set-attendance').onclick = () => {
            document.getElementById('input-actual').value = attendanceData.actual;
            document.getElementById('input-total').value = attendanceData.total;
            showModal('attendance-modal');
        };

        function saveAttendance() {
            const actual = parseInt(document.getElementById('input-actual').value);
            const total = parseInt(document.getElementById('input-total').value);

            if (isNaN(actual) || isNaN(total)) {
                showMessage('錯誤', '請輸入有效的數字！');
                return;
            }
            if (actual < 0 || total < 0) {
                showMessage('錯誤', '人數不可為負數！');
                return;
            }
            if (actual > total) {
                showMessage('設定錯誤', '實到人數不能超過應到人數！');
                return;
            }

            attendanceData.actual = actual;
            attendanceData.total = total;
            localStorage.setItem('lcjh_attendance', JSON.stringify(attendanceData));
            updateAttendanceDisplay();
            closeModal('attendance-modal');
        }

        function updateAttendanceDisplay() {
            document.getElementById('disp-actual').innerText = attendanceData.actual;
            document.getElementById('disp-total').innerText = attendanceData.total;
        }

        document.getElementById('btn-edit-subjects').onclick = () => {
            document.getElementById('pwd-input').value = '';
            showModal('pwd-modal');
        };

        function verifyPassword() {
            const pwd = document.getElementById('pwd-input').value;
            // 預設密碼 lcjh123
            if (pwd === 'lcjh123') {
                closeModal('pwd-modal');
                openEditSubjectsModal();
            } else {
                showMessage('驗證失敗', '密碼錯誤，請重新輸入。');
            }
        }

        function openEditSubjectsModal() {
            const container = document.getElementById('edit-content');
            let html = '';
            
            // 【新增】動態產生學年度與段考次數輸入區塊
            html += `
                <div class="form-row">
                    <div class="form-col">
                        <div class="input-group">
                            <label>學年度 (如: 115)：</label>
                            <input type="text" id="edit-exam-year" value="${examInfo.year}">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="input-group">
                            <label>段考次數：</label>
                            <input type="text" id="edit-exam-number" value="${examInfo.exam}">
                        </div>
                    </div>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2vh 0;">
            `;

            html += `<div class="edit-day-title">第一天</div>`;
            html += `<table class="edit-table"><tr><th>節次</th><th>時間</th><th>科目名稱</th></tr>`;
            scheduleData.day1.forEach((item, idx) => {
                html += `<tr>
                            <td>${item.period}</td>
                            <td>${item.start} ~ ${item.end}</td>
                            <td><input type="text" id="edit-d1-${idx}" value="${item.subject}"></td>
                         </tr>`;
            });
            html += `</table>`;

            html += `<div class="edit-day-title">第二天</div>`;
            html += `<table class="edit-table"><tr><th>節次</th><th>時間</th><th>科目名稱</th></tr>`;
            scheduleData.day2.forEach((item, idx) => {
                html += `<tr>
                            <td>${item.period}</td>
                            <td>${item.start} ~ ${item.end}</td>
                            <td><input type="text" id="edit-d2-${idx}" value="${item.subject}"></td>
                         </tr>`;
            });
            html += `</table>`;

            container.innerHTML = html;
            showModal('edit-modal');
        }

        function saveSubjects() {
            // 儲存學年度與次數
            examInfo.year = document.getElementById('edit-exam-year').value;
            examInfo.exam = document.getElementById('edit-exam-number').value;
            localStorage.setItem('lcjh_exam_info', JSON.stringify(examInfo));
            updateExamTitleDisplay();

            // 儲存各節次科目
            scheduleData.day1.forEach((item, idx) => {
                item.subject = document.getElementById(`edit-d1-${idx}`).value;
            });
            scheduleData.day2.forEach((item, idx) => {
                item.subject = document.getElementById(`edit-d2-${idx}`).value;
            });

            localStorage.setItem('lcjh_schedule', JSON.stringify(scheduleData));
            renderSchedule();
            closeModal('edit-modal');
            showMessage('成功', '標題與科目更新完成！');
        }

    </script>
</body>
</html>
