<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘭州國中段考時程顯示板</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --highlight-bg: #10b981; /* 醒目提示背景色 (綠色) */
            --highlight-text: #ffffff;
            --border-color: #333333;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", "Microsoft JhengHei", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 防止主畫面滾動，確保一頁呈現 */
        }

        /* 按鈕共用樣式 */
        .btn {
            background-color: #333333;
            color: var(--text-main);
            border: none;
            padding: 1.5vh 1.5vw;
            font-size: clamp(16px, 1.8vw, 32px);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background-color: #444444;
            transform: translateY(-2px);
        }

        .btn.active {
            background-color: var(--accent);
            color: #ffffff;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* 左半部：時程區 */
        .left-panel {
            flex: 5.5;
            padding: 2.5vw 3vw;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-color);
            background-color: var(--bg-color);
            height: 100vh;
        }

        /* 頂部標頭容器 (使用 Flexbox 避免按鈕遮擋內容) */
        .left-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2vh;
        }

        .right-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5vw 3vw 0 3vw;
            width: 100%;
            gap: 2vw;
        }

        /* 標題可編輯區域 */
        .page-title {
            font-size: clamp(36px, 3.5vw, 60px);
            font-weight: bold;
            color: #ffffff;
            padding: 1vh 1vw;
            border-bottom: 2px solid var(--border-color);
            outline: none;
            transition: background 0.2s;
            text-align: center;
            flex-grow: 1;
            margin: 0;
        }
        
        .page-title:focus {
            background-color: #2a2a2a;
            border-bottom-color: var(--accent);
            border-radius: 8px 8px 0 0;
        }

        .day-tabs {
            display: flex;
            gap: 1vw;
        }

        /* 表格區域高度自適應延展 */
        .table-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            margin-top: 1vh;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            font-size: clamp(24px, 2.8vw, 50px); /* 極致大字體 */
        }

        thead {
            height: 6vh;
        }

        th {
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1vh;
            text-align: left;
            font-size: clamp(20px, 2.2vw, 40px);
        }

        tbody tr {
            height: calc(100% / 7); /* 均分高度，確保填滿畫面 */
        }

        td {
            padding: 0 0.5vw;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .col-period { width: 22%; font-weight: bold; }
        .col-time { width: 38%; color: #bbbbbb; }
        .col-subject { width: 40%; }

        /* 正在進行的時段高亮 (無脈衝動畫) */
        .highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
        }
        .highlight td {
            border-bottom: 1px solid transparent;
        }
        .highlight td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .highlight td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        
        .highlight .col-time {
            color: #e0f2fe; /* 稍微提亮時間顏色 */
        }

        /* 右半部：時鐘與人數區 */
        .right-panel {
            flex: 4.5;
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            position: relative;
        }

        .time-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 5vh;
        }

        .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            white-space: nowrap;
        }

        .ampm {
            font-size: clamp(36px, 4vw, 70px);
            font-weight: bold;
            color: var(--text-muted);
            margin-right: 1.5vw;
        }

        .hours-mins {
            font-size: clamp(100px, 12vw, 240px); /* 超大時間字體 */
            font-weight: bold;
            line-height: 1;
            letter-spacing: -2px;
        }

        .seconds {
            font-size: clamp(50px, 6vw, 120px); /* 秒數較小 */
            color: var(--text-muted);
            margin-left: 0.5vw;
        }

        .attendance-container {
            margin-top: 8vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3vh;
            background: rgba(0,0,0,0.2);
            padding: 5vh 5vw;
            border-radius: 24px;
            width: 80%;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 實到人數與應到人數 (實到在上) */
        .attendance-item {
            font-size: clamp(36px, 4vw, 70px);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .actual-text { color: #facc15; } /* 實到人數用黃色突顯 */
        .expected-text { color: #94a3b8; }

        .attendance-val {
            font-size: clamp(48px, 5.5vw, 90px);
            margin-left: 2vw;
        }

        /* 彈出式對話框 (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--panel-bg);
            padding: 3vw 4vw;
            border-radius: 16px;
            width: 70vw;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: 90vh; /* 限制最大高度，以防超出螢幕 */
        }

        .modal-title {
            font-size: clamp(24px, 3vw, 48px);
            margin-bottom: 2vh;
            color: #ffffff;
            text-align: center;
            flex-shrink: 0;
        }

        /* 讓對話框內容可滑動 (Scrollable) */
        .modal-body {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 1.5vw;
            margin-bottom: 1vh;
            /* 針對大屏觸控優化的滾動條 */
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--bg-color);
        }

        /* Webkit 瀏覽器自訂滾動條樣式 */
        .modal-body::-webkit-scrollbar {
            width: 12px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 6px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover {
            background-color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 2.5vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-group label {
            font-size: clamp(18px, 2.2vw, 36px);
            flex: 1;
            color: var(--text-main);
        }

        .form-group input {
            flex: 2;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            color: white;
            font-size: clamp(20px, 2.5vw, 40px);
            padding: 1.5vh 1vw;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .error-msg {
            color: var(--danger);
            font-size: clamp(16px, 2vw, 32px);
            margin-bottom: 2vh;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 1.5vh 1vw;
            border-radius: 8px;
            text-align: center;
            flex-shrink: 0;
        }

        .modal-footer {
            margin-top: 2vh;
            display: flex;
            justify-content: flex-end;
            gap: 1.5vw;
            flex-shrink: 0;
            padding-top: 2vh;
            border-top: 1px solid var(--border-color);
        }

    </style>
</head>
<body>

    <!-- 左側時程面板 -->
    <div class="left-panel">
        <div class="left-header-container">
            <div class="day-tabs">
                <button class="btn active" id="btn-day1" onclick="switchDay(1)">第一天</button>
                <button class="btn" id="btn-day2" onclick="switchDay(2)">第二天</button>
            </div>
            <button class="btn" onclick="promptPassword()" style="flex-shrink: 0;">編輯科目</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-period">節次</th>
                        <th class="col-time">時間</th>
                        <th class="col-subject">科目</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    <!-- JavaScript 動態生成表格內容 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右側時間與人數面板 -->
    <div class="right-panel">
        <div class="right-header-container">
            <h1 class="page-title" contenteditable="true" spellcheck="false">蘭州國中第X次段考</h1>
            <button class="btn" onclick="openAttendanceModal()" style="flex-shrink: 0;">設定人數</button>
        </div>

        <div class="time-container">
            <div class="clock-display">
                <span class="ampm" id="clock-ampm">上午</span>
                <span class="hours-mins" id="clock-hm">12:00</span>
                <span class="seconds" id="clock-s">:00</span>
            </div>
            
            <div class="attendance-container">
                <!-- 實到與應到位置對調 (實到在上) -->
                <div class="attendance-item actual-text">
                    <span>實到人數：</span>
                    <span class="attendance-val" id="display-actual">30</span>
                </div>
                <div class="attendance-item expected-text">
                    <span>應到人數：</span>
                    <span class="attendance-val" id="display-expected">30</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯科目 Modal (具備滑動軸) -->
    <div class="modal-overlay" id="subject-modal">
        <div class="modal-content">
            <h2 class="modal-title" id="subject-modal-title">編輯第一天科目</h2>
            <!-- modal-body 是可滑動的區域 -->
            <div class="modal-body" id="subject-inputs-container">
                <!-- 動態生成 Input -->
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('subject-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveSubjects()">儲存</button>
            </div>
        </div>
    </div>

    <!-- 設定人數 Modal -->
    <div class="modal-overlay" id="attendance-modal">
        <div class="modal-content">
            <h2 class="modal-title">設定人數</h2>
            <div class="error-msg" id="attendance-error"></div>
            <div class="modal-body">
                <div class="form-group">
                    <label>實到人數：</label>
                    <input type="number" id="input-actual" min="0">
                </div>
                <div class="form-group">
                    <label>應到人數：</label>
                    <input type="number" id="input-expected" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('attendance-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveAttendance()">儲存</button>
            </div>
        </div>
    </div>

    <!-- 密碼輸入 Modal -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-content" style="width: 40vw; max-width: 600px;">
            <h2 class="modal-title">需要權限</h2>
            <div class="error-msg" id="password-error"></div>
            <div class="modal-body" style="overflow: visible;">
                <div class="form-group" style="justify-content: center; margin-bottom: 0;">
                    <input type="password" id="input-password" placeholder="請輸入密碼以編輯科目" style="width: 100%; text-align: center;" onkeypress="if(event.key === 'Enter') verifyPassword()">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('password-modal')">取消</button>
                <button class="btn btn-primary" onclick="verifyPassword()">確認</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心資料狀態 ---
        let currentDay = 1;
        let expectedCount = 30;
        let actualCount = 30;

        const scheduleData = {
            1: [
                { id: "1-1", period: "第一節", start: "08:30", end: "09:15", subject: "自習" },
                { id: "1-2", period: "第二節", start: "09:25", end: "10:10", subject: "數學04" },
                { id: "1-3", period: "第三節", start: "10:20", end: "11:05", subject: "自習" },
                { id: "1-4", period: "第四節", start: "11:15", end: "12:00", subject: "英語02" },
                { id: "1-5", period: "第五節", start: "13:15", end: "14:05", subject: "作文" },
                { id: "1-6", period: "第六節", start: "14:20", end: "15:05", subject: "自習" },
                { id: "1-7", period: "第七節", start: "15:15", end: "16:00", subject: "理化12" }
            ],
            2: [
                { id: "2-1", period: "第一節", start: "08:30", end: "09:00", subject: "自習" },
                { id: "2-2", period: "第二節", start: "09:00", end: "10:10", subject: "公民06;歷史08;地理09" },
                { id: "2-3", period: "第三節", start: "10:20", end: "11:05", subject: "自習" },
                { id: "2-4", period: "第四節", start: "11:15", end: "12:00", subject: "國文01" }
            ]
        };

        // --- 初始化 ---
        function init() {
            renderSchedule();
            updateClock();
            setInterval(updateClock, 500); // 每半秒更新一次時鐘與高亮狀態
        }

        // --- 渲染時程表 ---
        function renderSchedule() {
            const tbody = document.getElementById('schedule-body');
            tbody.innerHTML = '';
            
            const dayData = scheduleData[currentDay];
            dayData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.id = `row-${currentDay}-${index}`;
                tr.innerHTML = `
                    <td class="col-period">${item.period}</td>
                    <td class="col-time">${item.start} ~ ${item.end}</td>
                    <td class="col-subject">${item.subject}</td>
                `;
                tbody.appendChild(tr);
            });
            checkHighlight(); // 渲染完立即檢查高亮
        }

        // --- 切換天數 ---
        function switchDay(day) {
            currentDay = day;
            document.getElementById('btn-day1').classList.toggle('active', day === 1);
            document.getElementById('btn-day2').classList.toggle('active', day === 2);
            renderSchedule();
        }

        // --- 時鐘與高亮邏輯 ---
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            // 12小時制處理
            const ampm = h >= 12 ? '下午' : '上午';
            let displayH = h % 12;
            displayH = displayH ? displayH : 12; // 0點顯示為12
            
            // 補零
            const displayM = m < 10 ? '0' + m : m;
            const displayS = s < 10 ? '0' + s : s;

            document.getElementById('clock-ampm').innerText = ampm;
            document.getElementById('clock-hm').innerText = displayH + ':' + displayM;
            document.getElementById('clock-s').innerText = ':' + displayS;

            checkHighlight(h, m);
        }

        // 將 HH:MM 轉換為從00:00開始的分鐘數，方便比較
        function timeToMinutes(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
        }

        function checkHighlight(currentH = new Date().getHours(), currentM = new Date().getMinutes()) {
            const currentMins = currentH * 60 + currentM;
            const dayData = scheduleData[currentDay];

            dayData.forEach((item, index) => {
                const startMins = timeToMinutes(item.start);
                const endMins = timeToMinutes(item.end);
                const row = document.getElementById(`row-${currentDay}-${index}`);
                
                if (row) {
                    // 判斷是否在該節次的區間內 (包含開始，不包含結束的那一分鐘)
                    if (currentMins >= startMins && currentMins < endMins) {
                        row.classList.add('highlight');
                    } else {
                        row.classList.remove('highlight');
                    }
                }
            });
        }

        // --- Modal 共用邏輯 ---
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // --- 密碼驗證邏輯 ---
        function promptPassword() {
            document.getElementById('password-error').style.display = 'none';
            document.getElementById('input-password').value = '';
            document.getElementById('password-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('input-password').focus(), 100);
        }

        function verifyPassword() {
            const pwd = document.getElementById('input-password').value;
            if (pwd === 'lcjh123') {
                closeModal('password-modal');
                openSubjectModal();
            } else {
                const errorDiv = document.getElementById('password-error');
                errorDiv.innerText = "密碼錯誤，請重新輸入";
                errorDiv.style.display = 'block';
                document.getElementById('input-password').value = '';
                document.getElementById('input-password').focus();
            }
        }

        // --- 編輯科目功能 ---
        function openSubjectModal() {
            document.getElementById('subject-modal-title').innerText = `編輯第 ${currentDay} 天科目`;
            const container = document.getElementById('subject-inputs-container');
            container.innerHTML = '';

            scheduleData[currentDay].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label>${item.period} (${item.start}-${item.end})</label>
                    <input type="text" id="subj-input-${index}" value="${item.subject}">
                `;
                container.appendChild(div);
            });

            document.getElementById('subject-modal').style.display = 'flex';
        }

        function saveSubjects() {
            scheduleData[currentDay].forEach((item, index) => {
                const input = document.getElementById(`subj-input-${index}`);
                if (input) {
                    item.subject = input.value;
                }
            });
            closeModal('subject-modal');
            renderSchedule();
        }

        // --- 設定人數功能 ---
        function openAttendanceModal() {
            document.getElementById('attendance-error').style.display = 'none';
            document.getElementById('input-actual').value = actualCount;
            document.getElementById('input-expected').value = expectedCount;
            document.getElementById('attendance-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('input-actual').focus(), 100);
        }

        function saveAttendance() {
            const actualInput = parseInt(document.getElementById('input-actual').value, 10);
            const expectedInput = parseInt(document.getElementById('input-expected').value, 10);
            const errorDiv = document.getElementById('attendance-error');

            if (isNaN(actualInput) || isNaN(expectedInput)) {
                errorDiv.innerText = "請輸入有效的數字";
                errorDiv.style.display = 'block';
                return;
            }
            if (actualInput < 0 || expectedInput < 0) {
                errorDiv.innerText = "人數不可為負數";
                errorDiv.style.display = 'block';
                return;
            }
            if (actualInput > expectedInput) {
                errorDiv.innerText = "實到人數不能超過應到人數";
                errorDiv.style.display = 'block';
                return;
            }

            actualCount = actualInput;
            expectedCount = expectedInput;

            document.getElementById('display-actual').innerText = actualCount;
            document.getElementById('display-expected').innerText = expectedCount;

            closeModal('attendance-modal');
        }

        // 啟動程式
        window.onload = init;

    </script>
</body>
</html>
